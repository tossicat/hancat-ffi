name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: libhancat_ffi.so
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: libhancat_ffi.dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: hancat_ffi.dll

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.artifact }} dist/
          cp include/hancat.h dist/
          tar czf hancat-ffi-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/hancat_ffi.dll dist/
          cp target/release/hancat_ffi.dll.lib dist/
          cp include/hancat.h dist/
          7z a hancat-ffi-${{ github.ref_name }}-${{ matrix.target }}.zip dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hancat-ffi-${{ matrix.target }}
          path: hancat-ffi-${{ github.ref_name }}-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            hancat-ffi-*.tar.gz
            hancat-ffi-*.zip
