# cbindgen 설정 파일
# 빌드 시 hancat.h 헤더 파일을 자동으로 생성합니다.

language = "C"
include_guard = "HANCAT_H"
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Don't modify this manually. */"

after_includes = """
#ifdef _WIN32
#  ifdef HANCAT_EXPORTS
#    define HANCAT_API __declspec(dllexport)
#  else
#    define HANCAT_API __declspec(dllimport)
#  endif
#else
#  define HANCAT_API
#endif
"""

[export]
prefix = "hancat"

[fn]
prefix = "HANCAT_API"
